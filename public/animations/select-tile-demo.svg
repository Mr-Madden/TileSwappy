<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <style>
      @keyframes pulseRed {
        0%, 100% { 
          stroke-width: 4;
          stroke-opacity: 1;
        }
        50% { 
          stroke-width: 6;
          stroke-opacity: 0.5;
        }
      }
      @keyframes clickIndicator {
        0%, 100% { 
          r: 8;
          opacity: 1;
        }
        50% { 
          r: 12;
          opacity: 0.2;
        }
      }
      .red-border {
        animation: pulseRed 1.5s ease-in-out infinite;
      }
      .click-ring {
        animation: clickIndicator 1.5s ease-in-out infinite;
      }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="200" fill="#1a2332"/>
  
  <!-- Tile 1 - with red pulsing border -->
  <g>
    <rect x="40" y="75" width="50" height="50" rx="4" fill="#8B5CF6"/>
    <rect x="40" y="75" width="50" height="25" fill="#EC4899"/>
    <rect x="40" y="75" width="25" height="25" fill="#F59E0B"/>
    <!-- Animated red border -->
    <rect class="red-border" x="40" y="75" width="50" height="50" rx="4" fill="none" stroke="#EF4444"/>
  </g>
  
  <!-- Animated click indicators on first tile -->
  <circle class="click-ring" cx="65" cy="100" fill="none" stroke="#EF4444" stroke-width="2.5"/>
  <circle cx="65" cy="100" r="4" fill="#EF4444" opacity="0.8"/>
  
  <!-- Tile 2 - normal (dimmed) -->
  <g opacity="0.5">
    <rect x="110" y="75" width="50" height="50" rx="4" fill="#3B82F6"/>
    <rect x="110" y="75" width="50" height="25" fill="#10B981"/>
    <rect x="110" y="75" width="25" height="25" fill="#F59E0B"/>
    <rect x="110" y="75" width="50" height="50" rx="4" fill="none" stroke="#4a5568" stroke-width="2"/>
  </g>
  
  <!-- Labels -->
  <text x="100" y="155" font-family="Arial" font-size="12" font-weight="600" fill="#e2e8f0" text-anchor="middle">Click tile (red border appears)</text>
  <text x="100" y="175" font-family="Arial" font-size="11" font-weight="bold" fill="#EF4444" text-anchor="middle">Step 1 of 2</text>
</svg>